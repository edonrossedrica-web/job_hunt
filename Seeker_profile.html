<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seeker Profile - HireUp</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
    body{background:#0c1117;color:#fff}
    .navbar{position:fixed;top:0;width:100%;background:rgba(0,0,0,.85);padding:15px 40px;z-index:1000}
    .nav-top{display:flex;justify-content:space-between;align-items:center}
    .logo{font-weight:800;font-size:20px}
    .logo span{color:#3aa0ff}
    .back-btn{background:rgba(15,23,42,.7);border:1px solid rgba(58,160,255,.4);color:#fff;border-radius:999px;padding:6px 12px;cursor:pointer;font-size:12px;letter-spacing:1px;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px}
    .back-btn:hover{border-color:#3aa0ff;color:#3aa0ff}
    .page{padding:140px 60px 60px;max-width:1100px;margin:auto}
    .banner{height:200px;background:linear-gradient(135deg,#3aa0ff,#1f4d8f);border-radius:20px;margin-bottom:-70px}
    .header{text-align:center;margin-bottom:60px;position:relative}
    .avatar-row{display:flex;justify-content:center;align-items:flex-end;gap:14px;flex-wrap:wrap}
    .avatar{width:120px;height:120px;border-radius:22px;border:4px solid #3aa0ff;background:#ffffff;margin:0;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;position:relative;box-shadow:0 10px 30px rgba(0,0,0,.45)}
    .avatar img{width:100%;height:100%;object-fit:cover;display:block}
    .logo-btn{background:rgba(15,23,42,0.7);border:1px solid rgba(58,160,255,0.4);color:#fff;border-radius:999px;padding:10px 16px;cursor:pointer;font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:800;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
    .logo-btn:hover{border-color:#3aa0ff;color:#3aa0ff}
    .name-row{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:10px}
    .name{font-size:32px;font-weight:800}
    .title-row{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:6px;color:#3aa0ff;font-weight:600}
    #titleText:empty::before{content:"Add your title";opacity:.65;}
    .location-row{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:10px;color:#cbd5e1;font-size:13px}
    .location-row i{color:#3aa0ff}
    .location-row .edit{color:#2b8be6}
    .location-row .edit:hover{color:#3aa0ff}
    .edit{color:#2b8be6;cursor:pointer}
    .edit:hover{color:#3aa0ff}
    .pill{margin-top:10px;display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 12px;border:1px solid rgba(255,255,255,.10);background:rgba(15,23,42,.55);color:#a7f3d0;font-weight:700;font-size:12px;cursor:pointer}
    .pill .dot{width:9px;height:9px;border-radius:999px;background:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.15)}
    .pill.off{color:#cbd5e1;background:rgba(15,23,42,.35)}
    .pill.off .dot{background:#64748b;box-shadow:none}
    .section{background:#111827;padding:20px 30px;border-radius:16px;margin-bottom:25px;border:1px solid rgba(255,255,255,.06);position:relative}
    .st{font-size:20px;font-weight:700;margin-bottom:15px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .st .l{display:flex;align-items:center;gap:10px}
    .st i{color:#3aa0ff}
    .eb{position:absolute;top:20px;right:20px;background:none;border:none;color:#2b8be6;cursor:pointer;font-size:16px}
    .eb:hover{color:#3aa0ff}
    .about{color:#cbd5e1;line-height:1.75;white-space:pre-wrap;text-align:left;padding:2px 2px 0;font-size:14px}
    #aboutText:empty::before{content:"Add a short bio about you";opacity:.65;}
    textarea.edit-input{resize:none;overflow:hidden;}
    .edit-input{margin-top:10px;width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(15,23,42,.7);color:#fff;outline:none}
    .save-btn{margin-top:10px;background:#2b8be6;border:none;color:#fff;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:10px}
    .save-btn:hover{background:#3aa0ff}
    .resume-box{border:1px dashed rgba(58,160,255,.5);border-radius:14px;padding:20px;color:#bbb;background:rgba(12,17,23,.35);display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap}
    .resume-box .hint{flex:1 1 260px;line-height:1.5}
    .resume-box .rlist{width:100%;margin-top:12px}
    .resume-box .ritem{width:100%}
    .ub{background:#2b8be6;border:none;color:#fff;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:10px}
    .ub:hover{background:#3aa0ff}
    .rlist{margin-top:14px;display:flex;flex-direction:column;gap:10px}
    .ritem{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px;border-radius:12px;background:rgba(12,17,23,.45);border:1px solid rgba(255,255,255,.06)}
    .ritem.uploading{border-color:rgba(58,160,255,.35);background:rgba(15,35,58,.38)}
    .rname{flex:1 1 auto;font-weight:700;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
    .rmeta{margin-top:4px;font-size:12px;color:#8fb7e8}
    .ra{display:flex;gap:10px;flex:0 0 auto;flex-wrap:wrap;justify-content:flex-end}
    .lb{border:1px solid rgba(255,255,255,.10);background:transparent;color:#cbd5e1;padding:7px 10px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:38px}
    .lb:hover{border-color:rgba(58,160,255,.45);color:#fff}
    .lb[disabled]{opacity:.55;cursor:default}
    @media (max-width: 640px){
      .section{padding:18px}
      .resume-box{padding:16px}
      .resume-box .hint{flex-basis:100%}
      .ub{width:100%;justify-content:center}
      .ritem{flex-direction:column;align-items:stretch;gap:10px}
      .rname{white-space:normal;overflow:visible;text-overflow:unset;word-break:break-word}
      .ra{width:100%;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
      .lb{width:100%;padding:9px 8px;font-size:11px;gap:6px}
    }
    @media (max-width: 420px){
      .ra{grid-template-columns:1fr}
      .lb{font-size:12px}
    }
    .skills{display:flex;flex-wrap:wrap;gap:10px}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(12,17,23,.40);color:#e2e8f0;font-size:12px;font-weight:800;letter-spacing:.2px}
    .empty{color:#bbb;line-height:1.6}
    .clist{display:flex;flex-direction:column;gap:12px}
    .citem{display:flex;align-items:center;gap:10px;color:#cbd5e1}
    .citem i{color:#3aa0ff;width:18px;text-align:center}
    .publish-fab{position:fixed;right:24px;bottom:24px;z-index:9999;box-shadow:0 12px 34px rgba(0,0,0,.55)}
    .publish-fab.back-mode{
      left:auto;
      right:24px;
      bottom:24px;
      top:auto;
      transform:none;
      padding:10px 14px;
      min-height:42px;
      border-radius:999px;
      box-shadow:0 10px 24px rgba(0,0,0,.38);
    }

    /* confirm modal */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;padding:16px;z-index:12000}
    .modal-card{width:min(560px,100%);background:#0b1220;border:1px solid rgba(255,255,255,.10);border-radius:16px;box-shadow:0 18px 60px rgba(0,0,0,.70);overflow:hidden}
    .modal-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06)}
    .modal-title{font-weight:900;letter-spacing:-.2px}
    .modal-close{width:36px;height:36px;border-radius:12px;border:1px solid rgba(255,255,255,.10);background:rgba(12,17,23,.6);color:#cbd5e1;cursor:pointer}
    .modal-close:hover{color:#fff;border-color:rgba(255,255,255,.18)}
    .modal-body{padding:16px;color:#cbd5e1;line-height:1.6}
    .modal-actions{padding:14px 16px;display:flex;justify-content:flex-end;gap:10px;border-top:1px solid rgba(255,255,255,.06);background:rgba(12,17,23,.25)}
    .modal-cancel{border:1px solid rgba(255,255,255,.10);background:transparent;color:#cbd5e1;border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:800}
    .modal-cancel:hover{border-color:rgba(255,255,255,.18);color:#fff}
    body.page-loading{overflow:hidden}
    .page-loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(6,10,16,.78);backdrop-filter:blur(12px);opacity:0;visibility:hidden;pointer-events:none;transition:opacity .22s ease,visibility .22s ease;z-index:25000}
    .page-loader.is-visible{opacity:1;visibility:visible;pointer-events:auto}
    .page-loader-card{min-width:min(90vw,340px);padding:24px 26px;border-radius:20px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(17,24,39,.98),rgba(11,18,32,.98));box-shadow:0 22px 60px rgba(0,0,0,.45);display:flex;flex-direction:column;align-items:center;gap:14px}
    .page-loader-spin{width:50px;height:50px;border-radius:999px;border:4px solid rgba(255,255,255,.12);border-top-color:#3aa0ff;animation:spin .85s linear infinite}
    .page-loader-text{font-weight:800;letter-spacing:.3px;text-align:center;color:#e2e8f0}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:780px){
      .page{padding:140px 18px 56px}
      .publish-fab{
        left:50%;
        right:auto;
        bottom:14px;
        transform:translateX(-50%);
        padding:7px 12px;
        min-height:34px;
        font-size:11px;
      }
      .publish-fab.back-mode{
        left:50%;
        right:auto;
        bottom:14px;
        transform:translateX(-50%);
        padding:7px 12px;
        min-height:34px;
        font-size:11px;
      }
    }
  </style>
</head>
<body>
  <div class="page-loader" id="pageLoader" aria-hidden="true">
    <div class="page-loader-card" role="status" aria-live="polite">
      <div class="page-loader-spin" aria-hidden="true"></div>
      <div class="page-loader-text" id="pageLoaderText">Loading...</div>
    </div>
  </div>
  <div class="navbar">
    <div class="nav-top">
      <div class="logo">Hire<span>Up</span></div>
    </div>
  </div>

  <div class="page">
    <div class="banner"></div>

    <div class="header">
      <div class="avatar-row">
        <div class="avatar" id="avatarBtn" tabindex="0" role="button" aria-label="Change profile photo">
          <img id="avatarImg" alt="Profile photo" />
        </div>
        <button class="logo-btn" id="changePhotoBtn" type="button" style="display:none">Change Photo</button>
      </div>
      <input id="avatarInput" type="file" accept="image/*" style="display:none" />

      <div class="name-row">
        <div class="name" id="nameText">Your name</div>
        <i class="fa-solid fa-pen-to-square edit" id="editName" title="Edit"></i>
      </div>
      <div class="title-row">
        <span id="titleText"></span>
        <i class="fa-solid fa-pen-to-square edit" id="editTitle" title="Edit"></i>
      </div>
      <div class="location-row" id="locationRow">
        <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
        <span id="headerLocation">Add your location</span>
        <i class="fa-solid fa-pen-to-square edit" id="editHeaderLocation" title="Edit"></i>
      </div>

      <button type="button" class="pill" id="openBtn" aria-label="Toggle open to work">
        <span class="dot" aria-hidden="true"></span>
        <span id="openLabel">Open to Work</span>
      </button>
    </div>

    <div class="section" id="aboutSection">
      <div class="st"><div class="l"><i class="fa-solid fa-user"></i> Professional Summary</div></div>
      <button class="eb" type="button" id="editAbout"><i class="fa-solid fa-pen-to-square"></i></button>
      <p class="about" id="aboutText"></p>
    </div>

    <div class="section" id="resumeSection">
      <div class="st"><div class="l"><i class="fa-solid fa-file-arrow-up"></i> Resume</div></div>
      <div class="resume-box">
        <div class="hint">Upload your resume so employers can download it.</div>
        <button class="ub" type="button" id="uploadBtn"><i class="fa-solid fa-upload"></i> Upload file(s)</button>
        <input id="resumeInput" type="file" multiple
          accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/*"
          style="display:none" />
        <div class="rlist" id="resumeList" aria-live="polite"></div>
      </div>
    </div>

    <div class="section" id="skillsSection">
      <div class="st"><div class="l"><i class="fa-solid fa-code"></i> Skills</div></div>
      <button class="eb" type="button" id="editSkills"><i class="fa-solid fa-pen-to-square"></i></button>
      <div class="skills" id="skillsList"></div>
      <p class="empty" id="skillsEmpty" style="display:none">Add your top skills (e.g. JavaScript, React, SQL).</p>
    </div>

    <div class="section" id="contactSection">
      <div class="st"><div class="l"><i class="fa-solid fa-address-card"></i> Contact</div></div>
      <button class="eb" type="button" id="editContact"><i class="fa-solid fa-pen-to-square"></i></button>
      <div class="clist">
        <div class="citem"><i class="fa-solid fa-envelope"></i> <span id="cEmail"></span></div>
        <div class="citem"><i class="fa-solid fa-phone"></i> <span id="cPhone"></span></div>
        <div class="citem"><i class="fa-brands fa-facebook"></i> <span id="cFacebook"></span></div>
        <div class="citem"><i class="fa-brands fa-github"></i> <span id="cGithub"></span></div>
      </div>
    </div>

  </div>

  <button class="ub publish-fab" id="finishBtn" type="button" style="display:none">Publish Account</button>

  <div class="modal" id="confirmModal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-card" role="document">
      <div class="modal-head">
        <div class="modal-title" id="confirmTitle">Confirm</div>
        <button class="modal-close" id="confirmCloseBtn" type="button" aria-label="Close">×</button>
      </div>
      <div class="modal-body" id="confirmMessage">Are you sure?</div>
      <div class="modal-actions">
        <button class="modal-cancel" id="confirmCancelBtn" type="button">Cancel</button>
        <button class="ub" id="confirmOkBtn" type="button"><i class="fa-solid fa-rocket"></i> Publish</button>
      </div>
    </div>
  </div>

  <script>
    const KEY_PREFIX="smartHuntProfileCache_v1:seeker:";
    const SEEKER_LIMITS={name:100,title:100,about:1000,skills:300,location:100,email:254,phone:30,facebook:255,github:255};
    let profile={name:"",title:"",about:"",openToWork:true,avatarDataUrl:"",skills:[],resumes:[],contact:{email:"",phone:"",location:"",facebook:"",github:""},__updatedAt:0,__schema:1};
    let resumeUploadCount=0;
    const DEFAULT_AVATAR_SRC="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20fill='white'/%3E%3Ccircle%20cx='32'%20cy='32'%20r='29'%20fill='none'%20stroke='%23111'%20stroke-width='6'/%3E%3Ccircle%20cx='32'%20cy='25'%20r='12'%20fill='%23111'/%3E%3Cpath%20d='M14%2054c4-12%2032-12%2036%200'%20fill='%23111'/%3E%3C/svg%3E";
    let pageLoaderDepth=0;

    function showPageLoader(message){
      const loader=document.getElementById("pageLoader");
      const text=document.getElementById("pageLoaderText");
      if(!loader) return;
      if(text) text.textContent=String(message||"Loading...");
      pageLoaderDepth+=1;
      loader.classList.add("is-visible");
      loader.setAttribute("aria-hidden","false");
      document.body.classList.add("page-loading");
    }
    function hidePageLoader(){
      const loader=document.getElementById("pageLoader");
      if(!loader) return;
      pageLoaderDepth=Math.max(0,pageLoaderDepth-1);
      if(pageLoaderDepth>0) return;
      loader.classList.remove("is-visible");
      loader.setAttribute("aria-hidden","true");
      document.body.classList.remove("page-loading");
    }
    async function withPageLoader(task,message){
      showPageLoader(message);
      try{return await task();}finally{hidePageLoader();}
    }
    function navigateWithLoader(url,message){
      showPageLoader(message||"Loading page...");
      setTimeout(()=>{window.location.href=url;},260);
    }

    function cacheKey(){
      const email=String(localStorage.getItem("currentUserEmail")||"").trim().toLowerCase();
      const id=String(localStorage.getItem("currentUserId")||"").trim();
      return KEY_PREFIX+(email||id||"anon");
    }
    function readCache(){
      try{const raw=localStorage.getItem(cacheKey());return raw?JSON.parse(raw):null}catch{return null}
    }
    function writeCache(p){
      try{localStorage.setItem(cacheKey(),JSON.stringify(p||{}))}catch{}
    }
    function backendRequest(path,options){
      const token=localStorage.getItem("authToken");
      if(!token) return Promise.reject(new Error("No auth token"));
      const method=options&&options.method?options.method:"GET";
      const body=options&&options.body?options.body:null;
      return fetch(path,{method,headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:body?JSON.stringify(body):null})
        .then(async(res)=>{const data=await res.json().catch(()=>null);if(!res.ok) throw new Error(data&&data.error?data.error:`Request failed (${res.status})`);return data;});
    }
    function backendBlobRequest(path,options){
      const token=localStorage.getItem("authToken");
      if(!token) return Promise.reject(new Error("No auth token"));
      const method=options&&options.method?options.method:"GET";
      return fetch(path,{method,headers:{Authorization:`Bearer ${token}`}})
        .then(async(res)=>{
          if(!res.ok){
            const data=await res.json().catch(()=>null);
            throw new Error(data&&data.error?data.error:`Request failed (${res.status})`);
          }
          return {
            blob: await res.blob(),
            contentType: String(res.headers.get("content-type")||"").trim()
          };
        });
    }
    function ensureShape(p){
      const o=(p&&typeof p==="object")?{...p}:{};
      if(!Array.isArray(o.skills)) o.skills=[];
      if(!Array.isArray(o.resumes)) o.resumes=[];
      if(!o.contact||typeof o.contact!=="object") o.contact={};
      o.contact={
        email:String(o.contact.email||""),
        phone:String(o.contact.phone||""),
        location:String(o.contact.location||""),
        facebook:String(o.contact.facebook||o.contact.linkedin||""),
        github:String(o.contact.github||"")
      };
      if(typeof o.openToWork!=="boolean") o.openToWork=true;
      o.name=String(o.name||"");
      o.title=String(o.title||"");
      if(o.title.trim().toLowerCase()==="add your title") o.title="";
      o.about=String(o.about||"");
      if(o.about.trim().toLowerCase()==="add a short bio about you") o.about="";
      o.avatarDataUrl=typeof o.avatarDataUrl==="string"?o.avatarDataUrl:"";
      o.publishedAt=String(o.publishedAt||"").trim();
      o.resumes=o.resumes.map((r)=>{
        if(!r||typeof r!=="object") return null;
        return {
          id:String(r.id||""),
          name:String(r.name||"Resume"),
          type:String(r.type||""),
          size:Number(r.size)||0,
          uploadedAt:String(r.uploadedAt||""),
          storagePath:String(r.storagePath||""),
          dataUrl:typeof r.dataUrl==="string"?r.dataUrl:"",
          __uploading:Boolean(r.__uploading)
        };
      }).filter(Boolean);
      o.__schema=1;o.__updatedAt=Number(o.__updatedAt||0);
      return o;
    }
    function hasPublishedSeekerProfile(p){
      const o=ensureShape(p);
      return Boolean(o.publishedAt || (o.name.trim() && o.title.trim()));
    }
    function fileToDataUrl(file){
      return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(String(r.result||""));r.onerror=()=>reject(new Error("File read failed"));r.readAsDataURL(file);});
    }
    function dataUrlToBlob(dataUrl){
      const raw=String(dataUrl||"");
      const comma=raw.indexOf(",");
      if(comma<0) throw new Error("Invalid data URL");
      const header=raw.slice(0,comma);
      const base64=raw.slice(comma+1);
      const mimeMatch=/^data:([^;]+);base64$/i.exec(header);
      const mime=mimeMatch?mimeMatch[1]:"application/octet-stream";
      const bin=atob(base64);
      const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      return new Blob([bytes],{type:mime});
    }
    function previewDataUrl(dataUrl){
      try{
        const blob=dataUrlToBlob(dataUrl);
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");
        a.href=url;a.target="_blank";a.rel="noopener noreferrer";document.body.appendChild(a);a.click();a.remove();
        setTimeout(()=>{try{URL.revokeObjectURL(url)}catch{}},60000);
      }catch{
        alert("Could not preview this file (it may be too large or corrupted). Please re-upload and try again.");
      }
    }
    function isResumePreviewable(resume){
      const type=String(resume&&resume.type||"").toLowerCase();
      return type.startsWith("application/pdf")||type.startsWith("image/");
    }
    async function fetchResumeObjectUrl(resume,download){
      const r=resume&&typeof resume==="object"?resume:{};
      if(typeof r.dataUrl==="string"&&r.dataUrl.startsWith("data:")){
        const blob=dataUrlToBlob(r.dataUrl);
        return {url:URL.createObjectURL(blob),revoke:true};
      }
      if(!r.id) throw new Error("Missing resume id.");
      const suffix=download?"?download=1":"";

    async function load(){
      profile=ensureShape(readCache()||profile);
      try{
        const data=await backendRequest("/api/profile",{method:"GET"});
        const hadBackendProfile = Boolean(data&&data.ok&&data.profile&&typeof data.profile==="object"&&Object.keys(data.profile||{}).length);
        if(data&&data.ok&&data.profile) profile=ensureShape(data.profile);
        if(hadBackendProfile && !profile.publishedAt){
          profile.publishedAt=new Date().toISOString();
          try{await backendRequest("/api/profile",{method:"PUT",body:{profile}});}catch{}
        }
        if(data&&data.ok&&data.user){
          if(!profile.name.trim()) profile.name=String(data.user.name||"");
          if(!profile.contact.email.trim()){
            const backendEmail=String(data.user.email||"").trim();
            profile.contact.email=isSyntheticAuthEmail(backendEmail) ? "" : backendEmail;
          }
        }
        // If backend profile was empty, persist the seeded name/email so the page won't show placeholders on refresh.
        if(data&&data.ok&&!hadBackendProfile&&(profile.name.trim()||profile.contact.email.trim())){
          try{await backendRequest("/api/profile",{method:"PUT",body:{profile}});}catch{}
        }
      }catch{}
      if(!profile.name.trim()) profile.name=String(localStorage.getItem("currentUserName")||"").trim();
      if(!profile.contact.email.trim()){
        const storedEmail=String(localStorage.getItem("currentUserEmail")||"").trim();
        profile.contact.email=isSyntheticAuthEmail(storedEmail) ? "" : storedEmail;
      }
      writeCache(profile);
      if(hasPublishedSeekerProfile(profile)) markFinishProfileDone("seeker",true);
    }

    function getFinishProfileDoneKey(role){
      const safeRole = role==="employer" ? "employer" : role==="seeker" ? "seeker" : String(role||"user");
      const email=String(localStorage.getItem("currentUserEmail")||"").trim().toLowerCase();
      const userId=String(localStorage.getItem("currentUserId")||"").trim();
      const id=userId||email||"anon";
      return `finishProfileDone_${safeRole}:${id}`;
    }
    function isFinishProfileDone(role){
      const perUserKey=getFinishProfileDoneKey(role);
      const perUser=localStorage.getItem(perUserKey);
      if(perUser!==null) return perUser==="true";
      const legacyKey=`finishProfileDone_${role}`;
      const legacy=localStorage.getItem(legacyKey);
      if(legacy==="true"){
        try{localStorage.setItem(perUserKey,"true");}catch{}
        try{localStorage.removeItem(legacyKey);}catch{}
        return true;
      }
      return false;
    }
    function markFinishProfileDone(role,done){
      const perUserKey=getFinishProfileDoneKey(role);
      try{
        if(done) localStorage.setItem(perUserKey,"true");
        else localStorage.removeItem(perUserKey);
      }catch{}
      try{localStorage.removeItem(`finishProfileDone_${role}`);}catch{}
    }

    document.getElementById("finishBtn").addEventListener("click",async(e)=>{
      const btn=e.currentTarget;
      if(isFinishProfileDone("seeker")){
        navigateWithLoader("index.html","Returning to home...");
        return;
      }
      const prev=btn.innerText;
      const isEditing = (id) => (document.getElementById(id)?.dataset?.editing === "1");
      if (isEditing("nameText") || isEditing("titleText") || isEditing("aboutText") || document.getElementById("skillsSection")?.dataset?.editing === "1") {
        alert("Please save your edits first, then publish your account.");
        return;
      }
      const contactIds = ["cEmail","cPhone","cFacebook","cGithub"];
      if (contactIds.some((id) => isEditing(id))) {
        alert("Please save your contact edits first, then publish your account.");
        return;
      }
      const ok = await showConfirmModal("Publish your account now?", { title: "Publish Account", okText: "Publish", cancelText: "Cancel" });
      if (!ok) return;

      btn.disabled=true;
      btn.innerText="Publishing...";
      try{
        // Refresh profile from current DOM (in case it was modified outside the editor).
        profile.name = String(document.getElementById("nameText")?.innerText || "").trim();
        profile.title = String(document.getElementById("titleText")?.innerText || "").trim();
        profile.about = String(document.getElementById("aboutText")?.innerText || "");

        if (!profile.name) throw new Error("Name is required before publishing.");
        if (!profile.title) throw new Error("Title is required before publishing.");

        if(!profile.publishedAt) profile.publishedAt=new Date().toISOString();
        try{profile.__updatedAt=Date.now();profile.__schema=1}catch{}
        writeCache(profile);
        await withPageLoader(()=>backendRequest("/api/profile",{method:"PUT",body:{profile}}),"Publishing profile...");
        markFinishProfileDone("seeker",true);
        localStorage.setItem("postSignupWelcome","seeker");
        try{setupPublishCta();}catch{}
        navigateWithLoader("index.html","Returning to home...");
      }catch(err){
        alert(err&&err.message?err.message:"Failed to publish your account. Please try again.");
        btn.disabled=false;
        btn.innerText=prev;
      }
    });

    (async function init(){
      if(!requireSeeker()) return;
      await load();
      render();
      setupPublishCta();
    })();
  </script>
</body>
</html>
