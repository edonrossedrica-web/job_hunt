<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employer Profile - HireUp</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#0c1117;
  color:white;
}

/* NAVBAR */

.navbar{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.85);
  padding:15px 40px;
  z-index:1000;
}

.nav-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-weight:800;
  font-size:20px;
  display:none;
}

.logo span{
  color:#3aa0ff;
}
.brand-logo{
  height:48px;
  width:auto;
  max-width:520px;
  display:block;
  border-radius:10px;
  object-fit:contain;
}
.back-btn{
  background:rgba(15,23,42,0.7);
  border:1px solid rgba(58,160,255,0.4);
  color:#fff;
  border-radius:999px;
  padding:6px 12px;
  cursor:pointer;
  font-size:12px;
  letter-spacing:1px;
  text-transform:uppercase;
}
.back-btn:hover{border-color:#3aa0ff;color:#3aa0ff;}

/* PAGE */

.page{
  padding:140px 60px 60px;
  max-width:1100px;
  margin:auto;
}

/* BANNER */

.company-banner{
  height:200px;
  background:linear-gradient(135deg,#3aa0ff,#1f4d8f);
  border-radius:20px;
  margin-bottom:-70px;
}

/* HEADER */

.company-header{
  text-align:center;
  margin-bottom:60px;
  position: relative;
}

.avatar-row{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:14px;
  flex-wrap:wrap;
}

.company-logo{
  width:120px;
  height:120px;
  border-radius:20px;
  border:4px solid #3aa0ff;
  background:white;
  object-fit:contain;
}

.company-name{
  font-size:32px;
  font-weight:800;
  margin-top:10px;
}

.company-industry{
  color:#3aa0ff;
  font-weight:600;
}

.company-meta{
  margin-top:10px;
  color:#bbb;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px;
}

.company-meta i.edit-icon{
  color:#2b8be6;
  cursor:pointer;
}

/* SECTION */

.section{
  background:#111827;
  padding:20px 30px;
  border-radius:16px;
  margin-bottom:25px;
  border:1px solid rgba(255,255,255,0.06);
  position: relative;
}

.section-title{
  font-size:20px;
  font-weight:700;
  margin-bottom:15px;
  display:flex;
  align-items:center;
  gap:10px;
}

.section-title i{
  color:#3aa0ff;
}

.section .edit-btn{
  position: absolute;
  top:20px;
  right:20px;
  background:none;
  border:none;
  color:#2b8be6;
  cursor:pointer;
  font-size:16px;
}

.section .edit-btn:hover{
  color:#3aa0ff;
}

/* Publish / Finish CTA (match seeker FAB) */
.publish-fab{
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 9999;
  box-shadow: 0 12px 34px rgba(0,0,0,0.55);
}

/* confirm modal (match seeker) */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  z-index:12000
}
.modal-card{
  width:min(560px,100%);
  background:#0b1220;
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  box-shadow:0 18px 60px rgba(0,0,0,.70);
  overflow:hidden
}
.modal-head{
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.06)
}
.modal-title{
  font-weight:900;
  letter-spacing:-.2px
}
.modal-close{
  width:36px;
  height:36px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(12,17,23,.6);
  color:#cbd5e1;
  cursor:pointer
}
.modal-close:hover{
  color:#fff;
  border-color:rgba(255,255,255,.18)
}
.modal-body{
  padding:16px;
  color:#cbd5e1;
  line-height:1.6
}
.modal-actions{
  padding:14px 16px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
  border-top:1px solid rgba(255,255,255,.06);
  background:rgba(12,17,23,.25)
}
.modal-cancel{
  border:1px solid rgba(255,255,255,.10);
  background:transparent;
  color:#cbd5e1;
  border-radius:12px;
  padding:10px 12px;
  cursor:pointer;
  font-weight:800
}
.modal-cancel:hover{
  border-color:rgba(255,255,255,.18);
  color:#fff
}
body.page-loading{
  overflow:hidden;
}
.page-loader{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:rgba(6,10,16,.78);
  backdrop-filter:blur(12px);
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:opacity .22s ease,visibility .22s ease;
  z-index:25000;
}
.page-loader.is-visible{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
}
.page-loader-card{
  min-width:min(90vw,340px);
  padding:24px 26px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg,rgba(17,24,39,.98),rgba(11,18,32,.98));
  box-shadow:0 22px 60px rgba(0,0,0,.45);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
}
.page-loader-spin{
  width:50px;
  height:50px;
  border-radius:999px;
  border:4px solid rgba(255,255,255,.12);
  border-top-color:#3aa0ff;
  animation:pageLoaderSpin .85s linear infinite;
}
.page-loader-text{
  font-weight:800;
  letter-spacing:.3px;
  text-align:center;
  color:#e2e8f0;
}
@keyframes pageLoaderSpin{
  to{transform:rotate(360deg)}
}

/* ABOUT */

.about-text{
  color:#cbd5e1;
  line-height:1.75;
  text-align:left;
  white-space:pre-wrap;
  padding:2px 2px 0;
  font-size:14px;
}

/* INFO GRID */

.info-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.info-box{
  background:#0c1117;
  padding:15px;
  border-radius:10px;
  min-width:0;
}

.info-label{
  font-size:13px;
  color:#888;
  margin-bottom:5px;
}

.info-value{
  font-weight:600;
  color:#fff;
  overflow-wrap:anywhere;
  word-break:break-word;
}

/* CONTACT */

.contact-item{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  color:#bbb;
}

.contact-item i{
  color:#3aa0ff;
}

.contact-item span{
  flex:1;
  overflow-wrap:anywhere;
  word-break:break-word;
}

/* EDITABLE INPUT */

.edit-input{
  width: 100%;
  padding: 5px 8px;
  border-radius: 5px;
  border: 1px solid #3aa0ff;
  background:#0c1117;
  color:white;
  resize:none;
  overflow:hidden;
}

/* SAVE BUTTON */

.save-btn{
  margin-top:10px;
  background:#3aa0ff;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.save-btn:hover{
  background:#2b8be6;
}

/* LOGO UPLOAD TOGGLE */
.logo-btn{
  margin-top:10px;
  background:rgba(15,23,42,0.7);
  border:1px solid rgba(58,160,255,0.4);
  color:#fff;
  border-radius:999px;
  padding:6px 12px;
  cursor:pointer;
  font-size:12px;
  letter-spacing:1px;
  text-transform:uppercase;
}
.logo-btn:hover{border-color:#3aa0ff;color:#3aa0ff;}

.editable-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  width:100%;
}

/* Let textboxes size naturally (no fixed widths). */
.company-header .save-btn,
.company-meta .save-btn{
  margin-top:0;
}

/* Empty-state placeholders (realistic first-time profile) */
.company-name:empty::before{content:"Enter company name";opacity:.7;}
.company-industry:empty::before{content:"Add industry";opacity:.7;}
#companyLocation:empty::before{content:"Add location";opacity:.7;}
.about-text:empty::before{content:"Add an about description";opacity:.7;}
#infoIndustry:empty::before{content:"—";opacity:.7;}
#infoSize:empty::before{content:"—";opacity:.7;}
#infoFounded:empty::before{content:"—";opacity:.7;}
#infoWebsite:empty::before{content:"—";opacity:.7;}
#contactEmail:empty::before{content:"—";opacity:.7;}
#contactPhone:empty::before{content:"—";opacity:.7;}
#contactFacebook:empty::before{content:"—";opacity:.7;}

/* Mobile: match seeker profile layout */
@media (max-width:780px){
  .navbar{padding:15px 16px;}
  .nav-top{
    justify-content:flex-start;
  }
  .brand-logo{
    display:none;
  }
  .logo{
    display:block;
  }
  .page{padding:140px 18px 56px;}
  .company-banner{height:160px;border-radius:18px;margin-bottom:-56px;}
  .company-header{margin-bottom:36px;}
  .company-logo{
    border-radius:22px;
    box-shadow:0 10px 30px rgba(0,0,0,.45);
    cursor:pointer;
  }
  .logo-btn{margin-top:0;padding:10px 16px;font-weight:800;white-space:nowrap;}
  .company-name{font-size:28px;}
  .company-meta{font-size:13px;flex-wrap:wrap;}
  .section{padding:18px;}
  .info-grid{grid-template-columns:1fr;gap:12px;}
  .info-box{padding:12px;}
  .publish-fab{
    left:12px;
    right:12px;
    width:calc(100% - 24px);
    bottom:14px;
    transform:none;
    justify-content:center;
    margin-top:0;
    padding:12px 16px;
    min-height:44px;
    font-size:13px;
    border-radius:999px;
    box-shadow:0 10px 24px rgba(0,0,0,.38);
  }
  .publish-fab.back-mode{
    left:12px;
    right:12px;
    width:calc(100% - 24px);
    bottom:14px;
    transform:none;
    justify-content:center;
    margin-top:0;
    padding:12px 16px;
    min-height:44px;
    font-size:13px;
  }
}
@media (max-width:420px){
  .company-name{font-size:26px;}
}

</style>
</head>

<body>

<script>
function backendRequest(pathname, options){
  const token = localStorage.getItem("authToken");
  if (!token) return Promise.reject(new Error("No auth token"));
  const method = options && options.method ? options.method : "GET";
  const body = options && options.body ? options.body : null;
  return fetch(pathname, {
    method,
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`,
    },
    body: body ? JSON.stringify(body) : null,
  }).then(async (res) => {
    const data = await res.json().catch(() => null);
    if (!res.ok) {
      const msg = data && data.error ? data.error : `Request failed (${res.status})`;
      throw new Error(msg);
    }
    return data;
  });
}

const PROFILE_CACHE_PREFIX = "smartHuntProfileCache_v1:";
let cacheQuotaWarned = false;
let backendSaveWarned = false;
let backendLoadWarned = false;
let pageLoaderDepth = 0;

function escapeAttr(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;");}
function escapeText(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function autoGrowTextarea(el){
  if(!el||!el.style) return;
  const max = Math.round(Math.min((window.innerHeight || 900) * 0.6, 520));
  const min = 44;
  el.style.height="auto";
  const next = Math.max(min, el.scrollHeight || 0);
  if(next > max){
    el.style.height = max + "px";
    el.style.overflowY = "auto";
  }else{
    el.style.height = next + "px";
    el.style.overflowY = "hidden";
  }
}
function wireAutoGrowTextarea(el){
  if(!el) return;
  if(el.dataset && el.dataset.autogrowWired==="1"){
    autoGrowTextarea(el);
    return;
  }
  if(el.dataset) el.dataset.autogrowWired="1";
  const handler=()=>autoGrowTextarea(el);
  el.addEventListener("input", handler);
  el.addEventListener("change", handler);
  el.addEventListener("focus", handler);
  el.addEventListener("click", handler);
  handler();
}

function showPageLoader(message){
  const loader = document.getElementById("pageLoader");
  const text = document.getElementById("pageLoaderText");
  if (!loader) return;
  if (text) text.textContent = String(message || "Loading...");
  pageLoaderDepth += 1;
  loader.classList.add("is-visible");
  loader.setAttribute("aria-hidden", "false");
  document.body.classList.add("page-loading");
}

function hidePageLoader(){
  const loader = document.getElementById("pageLoader");
  if (!loader) return;
  pageLoaderDepth = Math.max(0, pageLoaderDepth - 1);
  if (pageLoaderDepth > 0) return;
  loader.classList.remove("is-visible");
  loader.setAttribute("aria-hidden", "true");
  document.body.classList.remove("page-loading");
}

async function withPageLoader(task, message){
  showPageLoader(message);
  try {
    return await task();
  } finally {
    hidePageLoader();
  }
}

function navigateWithLoader(url, message){
  showPageLoader(message || "Loading page...");
  setTimeout(() => {
    window.location.href = url;
  }, 260);
}

function getFinishProfileDoneKey(role){
  const safeRole = role === "employer" ? "employer" : role === "seeker" ? "seeker" : String(role || "user");
  const email = String(localStorage.getItem("currentUserEmail") || "").trim().toLowerCase();
  const userId = String(localStorage.getItem("currentUserId") || "").trim();
  const id = userId || email || "anon";
  return `finishProfileDone_${safeRole}:${id}`;
}

function isFinishProfileDone(role){
  const perUserKey = getFinishProfileDoneKey(role);
  const perUser = localStorage.getItem(perUserKey);
  if (perUser !== null) return perUser === "true";

  // Back-compat: older builds used a global key (hid the CTA for all accounts in this browser).
  const legacyKey = `finishProfileDone_${role}`;
  const legacy = localStorage.getItem(legacyKey);
  if (legacy === "true") {
    try { localStorage.setItem(perUserKey, "true"); } catch {}
    try { localStorage.removeItem(legacyKey); } catch {}
    return true;
  }
  return false;
}

function markFinishProfileDone(role, done){
  const perUserKey = getFinishProfileDoneKey(role);
  try {
    if (done) localStorage.setItem(perUserKey, "true");
    else localStorage.removeItem(perUserKey);
  } catch {
    // ignore
  }
  try { localStorage.removeItem(`finishProfileDone_${role}`); } catch {}
}

function hasPublishedEmployerProfile(profile){
  const p = profile && typeof profile === "object" ? profile : {};
  const contact = p.contact && typeof p.contact === "object" ? p.contact : {};
  return Boolean(
    String(p.publishedAt || "").trim() ||
    String(p.companyName || "").trim() ||
    String(p.companyIndustry || "").trim() ||
    String(p.aboutText || "").trim() ||
    String(contact.email || "").trim() ||
    String(p.logoSrc || "").trim()
  );
}

let confirmResolve = null;
function closeConfirmModal(result){
  const modal = document.getElementById("confirmModal");
  if (modal) {
    modal.style.display = "none";
    modal.setAttribute("aria-hidden", "true");
  }
  if (typeof confirmResolve === "function") {
    const r = confirmResolve;
    confirmResolve = null;
    r(Boolean(result));
  }
}

function setConfirmOkLabel(okBtn, okText){
  if (!okBtn) return;
  okBtn.textContent = "";
  const icon = document.createElement("i");
  icon.className = "fa-solid fa-rocket";
  okBtn.appendChild(icon);
  okBtn.appendChild(document.createTextNode(` ${String(okText || "OK")}`));
}

function showConfirmModal(message, { title = "Confirm", okText = "OK", cancelText = "Cancel" } = {}){
  const modal = document.getElementById("confirmModal");
  const msgEl = document.getElementById("confirmMessage");
  const titleEl = document.getElementById("confirmTitle");
  const okBtn = document.getElementById("confirmOkBtn");
  const cancelBtn = document.getElementById("confirmCancelBtn");

  if (!modal || !msgEl || !titleEl || !okBtn || !cancelBtn) {
    try { return Promise.resolve(confirm(String(message || "Are you sure?"))); } catch { return Promise.resolve(true); }
  }

  closeConfirmModal(false);
  titleEl.textContent = String(title || "Confirm");
  msgEl.textContent = String(message || "Are you sure?");
  setConfirmOkLabel(okBtn, okText || "OK");
  cancelBtn.textContent = String(cancelText || "Cancel");
  modal.style.display = "flex";
  modal.setAttribute("aria-hidden", "false");
  return new Promise((resolve) => { confirmResolve = resolve; });
}

(function setupConfirmModal(){
  const modal = document.getElementById("confirmModal");
  const okBtn = document.getElementById("confirmOkBtn");
  const cancelBtn = document.getElementById("confirmCancelBtn");
  const closeBtn = document.getElementById("confirmCloseBtn");

  if (okBtn) okBtn.addEventListener("click", () => closeConfirmModal(true));
  if (cancelBtn) cancelBtn.addEventListener("click", () => closeConfirmModal(false));
  if (closeBtn) closeBtn.addEventListener("click", () => closeConfirmModal(false));
  if (modal) {
    modal.addEventListener("click", (e) => {
      if (e && e.target === modal) closeConfirmModal(false);
    });
  }
  document.addEventListener("keydown", (e) => {
    const open = modal && modal.style.display === "flex";
    if (!open) return;
    if (e && e.key === "Escape") closeConfirmModal(false);
    if (e && e.key === "Enter") closeConfirmModal(true);
  });
})();

function warnBackendOnce(kind, err){
  const msg = String(err && err.message ? err.message : "");
  if (kind === "save") {
    if (backendSaveWarned) return;
    backendSaveWarned = true;
    alert(`Could not save your profile to the backend (${msg || "offline"}). Your changes are kept locally in this browser, but they won't sync across devices until the backend is reachable.`);
    return;
  }
  if (kind === "load") {
    if (backendLoadWarned) return;
    backendLoadWarned = true;
    alert(`Could not load your profile from the backend (${msg || "offline"}). Showing whatever is saved locally in this browser.`);
  }
}

function getLocalProfileCacheKey(){
  const role = "employer";
  const email = String(localStorage.getItem("currentUserEmail") || "").trim().toLowerCase();
  const userId = String(localStorage.getItem("currentUserId") || "").trim();
  const id = email || userId || "anon";
  return `${PROFILE_CACHE_PREFIX}${role}:${id}`;
}

function loadAnyLocalProfileCacheForRole(role){
  try {
    let best = null;
    let bestUpdatedAt = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k || !k.startsWith(`${PROFILE_CACHE_PREFIX}${role}:`)) continue;
      const raw = localStorage.getItem(k);
      if (!raw) continue;
      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch {
        continue;
      }
      if (!parsed || typeof parsed !== "object") continue;
      const updatedAt = Number(parsed.__updatedAt || 0);
      if (updatedAt > bestUpdatedAt) {
        bestUpdatedAt = updatedAt;
        best = parsed;
      }
    }
    return best;
  } catch {
    return null;
  }
}

function loadLocalProfileCache(){
  try {
    const key = getLocalProfileCacheKey();
    let current = null;
    const raw = localStorage.getItem(key);
    if (raw) {
      try {
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === "object") current = parsed;
      } catch {
        current = null;
      }
    }

    const best = loadAnyLocalProfileCacheForRole("employer");
    const currentTs = current && typeof current === "object" ? (Number(current.__updatedAt || 0) || 0) : 0;
    const bestTs = best && typeof best === "object" ? (Number(best.__updatedAt || 0) || 0) : 0;

    const chosen = bestTs > currentTs ? best : current;

    // Migrate the newest cache into the current key so profile won't "disappear" when id/email becomes available.
    try {
      if (chosen && chosen !== current) {
        localStorage.setItem(key, JSON.stringify({ ...chosen }));
      }
    } catch {
      // ignore
    }

    return chosen;
  } catch {
    return null;
  }
}

function saveLocalProfileCache(profile){
  try {
    const payload = profile && typeof profile === "object" ? { ...profile } : {};
    payload.__schema = 1;
    payload.__updatedAt = Number(payload.__updatedAt || 0) || Date.now();
    localStorage.setItem(getLocalProfileCacheKey(), JSON.stringify(payload));
  } catch (err) {
    const msg = String(err && err.message ? err.message : "");
    if (!cacheQuotaWarned && /quota/i.test(msg)) {
      cacheQuotaWarned = true;
      // Best-effort fallback: keep text fields even if large logo exceeds quota.
      try {
        const minimal = profile && typeof profile === "object" ? { ...profile } : {};
        minimal.__schema = 1;
        minimal.__updatedAt = Date.now();
        delete minimal.logoSrc;
        minimal.__attachmentsDropped = true;
        localStorage.setItem(getLocalProfileCacheKey(), JSON.stringify(minimal));
        alert("Your logo image is too large to save in the browser. Your text info was saved, but please upload a smaller image to keep the logo.");
        return;
      } catch {
        // fall through to original message
      }
      alert("Profile logo is too large to save in the browser. Please choose a smaller image (or compress it) and try again.");
    }
  }
}

function collectEmployerProfile(){
  const cached = loadLocalProfileCache();
  const getText = (id) => {
    const el = document.getElementById(id);
    if (!el) return "";
    const input = el.querySelector ? el.querySelector("input,textarea") : null;
    if (input && typeof input.value === "string") return input.value.trim();
    return String(el.innerText || "").trim();
  };
  return {
    companyName: getText("companyName"),
    companyIndustry: getText("companyIndustry"),
    companyLocation: getText("companyLocation"),
    aboutText: getText("aboutText"),
    publishedAt: String(cached && cached.publishedAt ? cached.publishedAt : "").trim(),
    info: {
      industry: getText("infoIndustry"),
      size: getText("infoSize"),
      founded: getText("infoFounded"),
      website: getText("infoWebsite"),
    },
    contact: {
      email: getText("contactEmail"),
      phone: getText("contactPhone"),
      facebook: getText("contactFacebook"),
      linkedin: getText("contactFacebook"),
    },
    logoSrc: document.getElementById("companyLogo")?.src || "",
  };
}

function persistEmployerProfileDraft({ attemptBackend = false } = {}){
  const profile = collectEmployerProfile();
  saveLocalProfileCache(profile);
  if (!attemptBackend) return;
  backendRequest("/api/profile", { method: "PUT", body: { profile } })
    .catch((err) => warnBackendOnce("save", err));
}

// Autosave (so users don't lose info if they forget to press Save buttons).
let employerAutosaveTimer = null;
function scheduleEmployerAutosave(){
  if (employerAutosaveTimer) clearTimeout(employerAutosaveTimer);
  employerAutosaveTimer = setTimeout(() => {
    employerAutosaveTimer = null;
    const runningServer = (window.location && (window.location.protocol === "http:" || window.location.protocol === "https:"));
    try {
      persistEmployerProfileDraft({ attemptBackend: runningServer });
    } catch {
      // ignore
    }
  }, 800);
}

try {
  document.addEventListener("input", scheduleEmployerAutosave, { capture: true });
  document.addEventListener("change", scheduleEmployerAutosave, { capture: true });
} catch {
  // ignore
}

function applyEmployerProfile(profile){
  if (!profile || typeof profile !== "object") return;
  const setText = (id, val) => {
    const el = document.getElementById(id);
    if (el && typeof val === "string") el.innerText = val;
  };
  if (typeof profile.companyName === "string") setText("companyName", profile.companyName);
  if (typeof profile.companyIndustry === "string") setText("companyIndustry", profile.companyIndustry);
  if (typeof profile.companyLocation === "string") setText("companyLocation", profile.companyLocation);
  if (typeof profile.aboutText === "string") setText("aboutText", profile.aboutText);

  const info = profile.info && typeof profile.info === "object" ? profile.info : {};
  setText("infoIndustry", info.industry || "");
  setText("infoSize", info.size || "");
  setText("infoFounded", info.founded || "");
  setText("infoWebsite", info.website || "");

  const contact = profile.contact && typeof profile.contact === "object" ? profile.contact : {};
  setText("contactEmail", contact.email || "");
  setText("contactPhone", contact.phone || "");
  setText("contactFacebook", contact.facebook || contact.linkedin || "");

  if (typeof profile.logoSrc === "string" && profile.logoSrc) {
    const logo = document.getElementById("companyLogo");
    if (logo) logo.src = profile.logoSrc;
  }
  if (hasPublishedEmployerProfile(profile)) {
    markFinishProfileDone("employer", true);
  }
}

function saveEmployerProfileToBackend(){
  const profile = collectEmployerProfile();
  saveLocalProfileCache(profile);
  return backendRequest("/api/profile", { method: "PUT", body: { profile } })
    .catch((err) => {
      warnBackendOnce("save", err);
      throw err;
    });
}

async function finishEmployerProfile(btn){
  const button = btn && typeof btn === "object" ? btn : document.getElementById("finishEmployerProfileBtn");
  const prevLabel = button ? String(button.innerText || "") : "";

  if (isFinishProfileDone("employer")) {
    navigateWithLoader("index.html?returnTo=employerOverview", "Returning to dashboard...");
    return;
  }

  const ok = await showConfirmModal("Publish your account now?", {
    title: "Publish Account",
    okText: "Publish",
    cancelText: "Cancel",
  });
  if (!ok) return;

  if (button) {
    button.disabled = true;
    button.innerText = "Saving...";
  }
  try {
    // Ensure the backend write completes before navigating away (navigation can abort in-flight fetch).
    const cached = loadLocalProfileCache();
    if (cached && typeof cached === "object" && !cached.publishedAt) {
      cached.publishedAt = new Date().toISOString();
      saveLocalProfileCache(cached);
    }
    await withPageLoader(() => saveEmployerProfileToBackend(), "Publishing profile...");
    markFinishProfileDone("employer", true);
    localStorage.setItem("postSignupWelcome","employer");
    try {
      setupFinishEmployerProfileCta();
    } catch {}
    navigateWithLoader("index.html?returnTo=employerOverview", "Returning to dashboard...");
  } catch (err) {
    alert(err?.message || "Failed to save your profile. Please try again.");
    if (button) {
      button.disabled = false;
      button.innerText = prevLabel || "Publish Account";
    }
  }
}

function setupFinishEmployerProfileCta() {
  const btn = document.getElementById("finishEmployerProfileBtn");
  if (!btn) return;
  const done = isFinishProfileDone("employer");
  btn.style.display = "inline-flex";
  btn.disabled = false;
  if (done) {
    btn.dataset.mode = "back";
    btn.classList.add("back-mode");
    btn.innerHTML = `<i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back`;
  } else {
    btn.dataset.mode = "publish";
    btn.classList.remove("back-mode");
    btn.textContent = "Publish Account";
  }
}

(function () {
  const logo = document.getElementById("companyLogo");
  const button = document.getElementById("companyLogoBtn");
  const input = document.getElementById("companyLogoInput");
  if (!logo || !button || !input) return;

  logo.addEventListener("click", function () {
    button.style.display =
      button.style.display === "inline-block" ? "none" : "inline-block";
  });

  button.addEventListener("click", function () {
    input.click();
  });

  input.addEventListener("change", function () {
    const file = this.files && this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (e) {
      const dataUrl = String(e && e.target && e.target.result ? e.target.result : "");
      if (dataUrl) {
        logo.src = dataUrl;
        const existing = loadLocalProfileCache();
        saveLocalProfileCache({ ...(existing && typeof existing === "object" ? existing : {}), logoSrc: dataUrl });
      }
      saveEmployerProfileToBackend().catch(() => {});
    };
    reader.readAsDataURL(file);
    button.style.display = "none";
  });
})();

// Load profile from backend when available (multi-device support).
(function () {
  const cached = loadLocalProfileCache();
  if (cached) applyEmployerProfile(cached);

  // Prefill the header company name from signup/login state even before the backend profile loads.
  // This avoids showing a blank header on first load (especially for offline/file:// demo mode).
  {
    const existingName = (document.getElementById("companyName")?.innerText || "").trim();
    const cachedName = String(cached && typeof cached === "object" && cached.companyName ? cached.companyName : "").trim();
    const nameFromStorage = String(localStorage.getItem("currentUserName") || "").trim();
    if (!existingName && !cachedName && nameFromStorage) {
      const el = document.getElementById("companyName");
      if (el) el.innerText = nameFromStorage;
      // Persist locally so navigation/reload won't ever show blank even if backend is unreachable.
      try {
        if (!cached) saveLocalProfileCache({ companyName: nameFromStorage });
      } catch {
        // ignore
      }
      // Keep local-only; do not auto-save to backend here (PUT replaces the whole profile).
    }
  }

  // Prefill contact email from signup/login state so Contact isn't blank by default.
  {
    const existingEmail = (document.getElementById("contactEmail")?.innerText || "").trim();
    const cachedEmail = String(
      cached && typeof cached === "object" && cached.contact && typeof cached.contact === "object" && cached.contact.email
        ? cached.contact.email
        : "",
    ).trim();
    const emailFromStorage = String(localStorage.getItem("currentUserEmail") || "").trim();
    if (!existingEmail && !cachedEmail && emailFromStorage) {
      const el = document.getElementById("contactEmail");
      if (el) el.innerText = emailFromStorage;
      // Persist locally so navigation/reload won't clear it even if backend is unreachable.
      try {
        const base = cached && typeof cached === "object" ? cached : {};
        const next = {
          ...base,
          contact: {
            ...(base.contact && typeof base.contact === "object" ? base.contact : {}),
            email: emailFromStorage,
          },
        };
        saveLocalProfileCache(next);
      } catch {
        // ignore
      }
      // Keep local-only; do not auto-save to backend here (PUT replaces the whole profile).
    }
  }

  backendRequest("/api/profile", { method: "GET" })
    .then((data) => {
      if (!data || !data.ok) return;
      if (data.profile && typeof data.profile === "object") {
        const backendProfile = data.profile;
        const cachedObj = cached && typeof cached === "object" ? cached : null;
        const cachedTs = cachedObj ? (Number(cachedObj.__updatedAt || 0) || 0) : 0;
        const backendTs = Number(backendProfile.__updatedAt || 0) || 0;
        const preferCached = cachedObj && cachedTs > backendTs;

        const mergedBase = cachedObj
          ? (preferCached ? { ...backendProfile, ...cachedObj } : { ...cachedObj, ...backendProfile })
          : backendProfile;

        const merged = {
          ...mergedBase,
          logoSrc: String(
            (preferCached
              ? (cachedObj?.logoSrc || backendProfile.logoSrc || "")
              : (backendProfile.logoSrc || cachedObj?.logoSrc || "")) || "",
          ).trim(),
        };
        applyEmployerProfile(merged);
        saveLocalProfileCache(merged);
      }

      // If backend profile is empty, prefill company name from signup (user.company).
      const existingName = (document.getElementById("companyName")?.innerText || "").trim();
      const companyFromUser = String(data.user && data.user.company ? data.user.company : "").trim();
      if (!existingName && companyFromUser) {
        const el = document.getElementById("companyName");
        if (el) el.innerText = companyFromUser;
        saveEmployerProfileToBackend().catch(() => {});
      }
    })
    .catch((err) => warnBackendOnce("load", err));
})();
